---
name: Deploy

# ============================================================================
# CD KIỂU MỚI (2026-07-14): BUILD TRÊN GITHUB — VPS CHỈ KÉO IMAGE VỀ CHẠY
#
# Trước đây: push main → Build (CI, vứt kết quả) → webhook → VPS tự docker
# build từ source 60-75 phút (đĩa VPS yếu, treo I/O, đụng trần timeout, web
# chậm trong lúc build). Giờ: máy GitHub (4 CPU/16GB, miễn phí vì repo public)
# build image bằng CHÍNH Dockerfile.dev cũ rồi đẩy lên GitHub Container
# Registry; Coolify chỉ `docker compose pull` (~vài phút).
#
#   push main ──► job build-image ──► ghcr.io/phihung13/medida-hub:latest
#                                          │
#                                          ▼ (job deploy — thêm ở bước 2,
#                                             sau khi package được mở public)
#                                     webhook Coolify → VPS pull + up -d
#
# Cache: layer image đẩy kèm vào tag :buildcache (mode=max). Lockfile không
# đổi → layer pnpm install (~13') được tái dùng nguyên con, build chỉ còn
# phần code + next/nest build (~10-15'). Các RUN --mount=type=cache trong
# Dockerfile vô tác dụng trên runner GitHub (máy dùng xong vứt) — không sao,
# cache layer qua registry thay thế vai trò đó.
#
# LƯU Ý: package ghcr lần đầu tạo ra sẽ ở chế độ PRIVATE — phải mở Public
# (Package settings → Change visibility) thì VPS mới pull được không cần
# đăng nhập. Repo vốn public nên image public không lộ thêm gì (.env, key
# không nằm trong image — xem .dockerignore).
# ============================================================================

on:
  push:
    branches: [main]
  # Kích tay (gh workflow run Deploy) — dùng khi chỉ đổi env trong Coolify.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Push dồn dập thì xếp hàng chứ không hủy lẫn nhau (bài học Coolify cũ).
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # Image ~6-8GB + cache export — dọn ~20GB rác có sẵn trên runner cho chắc.
      - name: Giải phóng đĩa runner
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build và đẩy image lên GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          push: true
          platforms: linux/amd64
          # provenance/sbom tạo manifest-list lạ dễ làm docker cũ trên VPS khó
          # chịu khi pull — tắt cho manifest đơn giản, một kiến trúc.
          provenance: false
          sbom: false
          tags: |
            ghcr.io/phihung13/medida-hub:latest
            ghcr.io/phihung13/medida-hub:${{ github.sha }}
          # GIỮ NGUYÊN giá trị cố định như compose cũ — đổi giá trị này là bust
          # toàn bộ cache layer (ENV nằm đầu Dockerfile).
          build-args: |
            NEXT_PUBLIC_VERSION=media-hub
          # Gắn package vào repo (hiện trên trang repo, kế thừa quyền Actions).
          labels: |
            org.opencontainers.image.source=https://github.com/phihung13/medida-hub
          cache-from: type=registry,ref=ghcr.io/phihung13/medida-hub:buildcache
          cache-to: type=registry,ref=ghcr.io/phihung13/medida-hub:buildcache,mode=max
