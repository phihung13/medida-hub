# ============================================================================
#  Việt Anh Media Hub — DEPLOY PRODUCTION (Docker trên VPS)
#  Khác docker-compose.yaml (image official Postiz, KHÔNG có custom): file này
#  BUILD image từ source repo (Dockerfile.dev) nên gồm Claude AI, Zalo, /viral…
#
#  Chạy:  docker compose -f docker-compose.prod.yaml up -d --build
#  Xem log:  docker compose -f docker-compose.prod.yaml logs -f media-hub
#  Biến bí mật/tuỳ chỉnh: điền vào .env (xem .env.production.example)
#
#  Kiến trúc all-in-one: 1 container media-hub chạy nginx(5000) + pm2
#  (backend:3000 + frontend:4200 + orchestrator:3002). nginx route /api→backend,
#  /uploads→volume tĩnh, còn lại→frontend. prisma-db-push tự chạy lúc khởi động.
# ============================================================================
services:
  media-hub:
    # ẢNH DỰNG SẴN TRÊN GITHUB (workflow Deploy → GHCR). VPS CHỈ KÉO VỀ, không
    # build tại chỗ nữa — hết cảnh build 60-75' treo I/O, đụng trần timeout, web
    # chậm lúc deploy. `pull_policy: always` ép kéo digest mới cho tag :latest
    # mỗi lần deploy (webhook Coolify gọi pull + up -d).
    # Chạy tay ngoài Coolify: `docker compose -f docker-compose.prod.yaml pull &&
    # ... up -d` (cần `docker login ghcr.io` nếu kho để private; hiện để public).
    image: ghcr.io/phihung13/medida-hub:latest
    pull_policy: always
    container_name: media-hub
    restart: always
    # env_file nạp API keys/secrets người dùng điền; environment bên dưới cố
    # định hạ tầng nội bộ (override .env nếu trùng — tránh trỏ nhầm DB/redis).
    env_file:
      - .env
    environment:
      # === Bắt buộc — domain & bảo mật (điền qua .env) ===
      MAIN_URL: '${FRONTEND_URL}'
      FRONTEND_URL: '${FRONTEND_URL}'
      NEXT_PUBLIC_BACKEND_URL: '${FRONTEND_URL}/api'
      JWT_SECRET: '${JWT_SECRET}'
      NOT_SECURED: '${NOT_SECURED:-false}'
      DISABLE_REGISTRATION: '${DISABLE_REGISTRATION:-true}'
      IS_GENERAL: 'true'
      # === Hạ tầng nội bộ (cố định theo service names) ===
      DATABASE_URL: 'postgresql://postiz-user:${POSTGRES_PASSWORD}@postiz-postgres:5432/postiz-db'
      REDIS_URL: 'redis://postiz-redis:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      TEMPORAL_ADDRESS: 'temporal:7233'
      # Coolify tự inject TOÀN BỘ .env (gồm PORT=4007 — vốn chỉ là CỔNG HOST) vào
      # container → backend đọc process.env.PORT và bind nhầm 4007. Ghim lại 3000
      # (nginx trong container proxy /api → localhost:3000). Frontend không ảnh
      # hưởng vì start cố định `next start -p 4200`.
      PORT: '3000'
      # === Lưu trữ media local (nginx phục vụ /uploads từ volume) ===
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'
      RUN_VIRAL_CRAWLER: '1'
      # === Key nhập QUA UI được lưu vào /config (volume) → sống qua rebuild.
      #     (anthropic-key.txt, image-gen.json, viral-config.json, social-keys.env)
      CONFIG_DIR: '/config'
      # === Bot Zalo (service riêng, KHÔNG cần domain riêng) ===
      # Trang Zalo trong Hub gọi bot qua proxy /botapi → địa chỉ nội bộ này.
      ZALO_BOT_URL: '${ZALO_BOT_URL:-http://zalo-bot:8088}'
      # Bí mật chung Hub ↔ bot (bot từ chối request thiếu/lệch token). Tạo:
      #   openssl rand -hex 24  — và đặt CÙNG GIÁ TRỊ cho service/app bot.
      HUB_BOT_TOKEN: '${HUB_BOT_TOKEN}'
    volumes:
      - media-hub-config:/config/
      - media-hub-uploads:/uploads/
    ports:
      - '${PORT:-4007}:5000'
    # Healthcheck THẬT: hỏi backend :3000 trong container (image không có curl —
    # dùng node fetch có sẵn). start_period 5' vì backend boot chờ Temporal.
    # Coolify sẽ hiện đúng healthy/unhealthy thay vì "running:unknown".
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    # media-hub nằm trên 3 network (2 compose + 1 Coolify tự gắn theo uuid
    # resource). Traefik không có nhãn chỉ định sẽ BỐC HÚ HỌA 1 IP trong số đó
    # → lượt deploy đen đủi trỏ vào network mà proxy không với tới → Gateway
    # Timeout. Ghim network của Coolify (COOLIFY_RESOURCE_UUID có sẵn lúc
    # build/deploy trên Coolify; chạy tay ngoài Coolify biến rỗng → label vô
    # hại vì không có Traefik).
    labels:
      - 'traefik.docker.network=${COOLIFY_RESOURCE_UUID:-}'
    networks:
      - postiz-network
      - temporal-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started

  # -----------------------------------------------------------------
  #  Bot Zalo (zca-js) — nguồn ảnh từ nhóm Zalo. KHÔNG expose cổng/domain:
  #  chỉ Hub gọi nội bộ qua /botapi (auth HUB_BOT_TOKEN). Toàn bộ thao tác
  #  (QR, duyệt bài, token FB, GBP…) làm trong trang Zalo của Hub.
  #  Build từ repo bot (đã có Dockerfile). Nếu deploy bot bằng app Coolify
  #  RIÊNG (như hiện tại): XÓA service này, đặt ZALO_BOT_URL trỏ địa chỉ nội
  #  bộ của app đó và set env cho app bot: WEB_HOST=0.0.0.0 + HUB_BOT_TOKEN.
  # -----------------------------------------------------------------
  zalo-bot:
    build:
      context: 'https://github.com/phihung13/zalo-bot-group-put-image-video.git'
    image: viet-anh-zalo-bot:latest
    container_name: zalo-bot
    restart: always
    environment:
      # Bind ra mạng nội bộ compose để container media-hub gọi được
      # (image mặc định 127.0.0.1; auth bằng HUB_BOT_TOKEN nên an toàn).
      WEB_HOST: '0.0.0.0'
      HUB_BOT_TOKEN: '${HUB_BOT_TOKEN}'
      DASHBOARD_USER: '${ZALO_DASHBOARD_USER:-admin}'
      DASHBOARD_PASS: '${ZALO_DASHBOARD_PASS}'
      # Cầu nối đẩy bài vào Hub: backend nằm trong container media-hub.
      POSTIZ_API_URL: 'http://media-hub:3000'
    volumes:
      # Image đã gom MỌI dữ liệu ghi-runtime về /app/data (DATA_DIR):
      # phiên Zalo, QR, routes.json, tokens.json, bài chờ, ảnh output.
      - zalo-bot-data:/app/data
    expose:
      - 8088
    networks:
      - postiz-network

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  # -----------------------------------------------------------------
  #  Temporal stack (engine lên lịch — orchestrator là worker của nó)
  # -----------------------------------------------------------------
  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U temporal
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      # KHÔNG mount ./dynamicconfig và KHÔNG set DYNAMIC_CONFIG_FILE_PATH:
      # Coolify map bind mount tương đối sang /data/coolify/applications/<uuid>/
      # (thư mục RỖNG) → file dynamicconfig không tồn tại → temporal fatal ngay
      # khi boot và crash-loop. Bỏ đi để dùng config/dynamicconfig/docker.yaml
      # có sẵn trong image temporalio/auto-setup.
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
      # Coolify gắn thêm network riêng vào container → temporal có 2 IP nhưng
      # mặc định chỉ bind vào IP đầu tiên (getent hosts), trong khi backend
      # resolve tên `temporal` ra IP của network CÒN LẠI → ECONNREFUSED 7233
      # dù temporal chạy khỏe. Bind 0.0.0.0 = nghe trên mọi interface.
      - BIND_ON_IP=0.0.0.0
    networks:
      - temporal-network
    expose:
      - 7233

volumes:
  postgres-volume:
  postiz-redis-data:
  media-hub-config:
  media-hub-uploads:
  zalo-bot-data:
  temporal-es-data:
  temporal-pg-data:

networks:
  postiz-network:
  # KHÔNG đặt name cố định — để compose tự prefix theo project, tránh xung đột
  # "network already exists with incorrect label" khi tạo resource Coolify mới
  # trong lúc network của resource cũ còn tồn tại.
  temporal-network:
    driver: bridge
